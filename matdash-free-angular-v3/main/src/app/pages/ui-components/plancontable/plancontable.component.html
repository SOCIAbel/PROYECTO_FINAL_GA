<div class="container">

  <h2>📘 Plan Contable General Empresarial (PCGE)</h2>

  <!-- FILTRO POR ELEMENTO -->
  <div class="filters-row">
    <select [(ngModel)]="selectedElement" (change)="filterByElement()">
      <option value="">Todos los elementos</option>

      <option value="1">Elemento 1 - Activo</option>
      <option value="2">Elemento 2 - Activo</option>
      <option value="3">Elemento 3 - Activo</option>

      <option value="4">Elemento 4 - Pasivo</option>

      <option value="5">Elemento 5 - Patrimonio</option>

      <option value="6">Elemento 6 - Gastos</option>

      <option value="7">Elemento 7 - Ingresos</option>

      <option value="8">Elemento 8 - Saldos Intermediarios de Gestión</option>

      <option value="9">Elemento 9 - Contabilidad Analítica</option>

      <option value="0">Elemento 0 - Cuentas de Orden</option>
    </select>
  </div>

  <!-- BUSCADOR -->
  <div class="search-box">
    <input
      type="text"
      placeholder="Buscar por código o nombre..."
      [(ngModel)]="searchText"
      (input)="onSearch()"
    />
  </div>

  <!-- TABLA -->
  <div class="table-container">
    <table class="pcge-table">
      <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Clase</th>
        <th>Nivel</th>
        <th>Padre</th>
        <th>Naturaleza</th>
        <th>Tipo</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let acc of filteredAccounts">
        <td>{{ acc.code }}</td>
        <td>{{ acc.name }}</td>
        <td>{{ acc.classNumber }}</td>
        <td>{{ acc.level }}</td>
        <td>{{ acc.parentCode }}</td>
        <td>{{ acc.nature }}</td>
        <td>{{ acc.type }}</td>
      </tr>
      </tbody>
    </table>
  </div>

</div>
